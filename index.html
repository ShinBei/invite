<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>饗宴邀約 - 互動邀請函</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;700&display=swap');

        body {
            background-color: #fdf2f2;
            font-family: 'Noto Serif TC', serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .container-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 600px 20px 100px 20px; /* 您指定的 600px 間距 */
            width: 100%;
        }

        .envelope-wrapper {
            position: relative;
            width: 100%;
            max-width: 320px;
            height: 200px;
            cursor: pointer;
            perspective: 1000px;
            z-index: 10;
        }

        /* 信封本體 */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #c0392b;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 5;
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #c0392b;
            clip-path: polygon(0 0, 50% 60%, 100% 0);
            z-index: 15;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pocket {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e74c3c;
            clip-path: polygon(0 0, 50% 60%, 100% 0, 100% 100%, 0 100%);
            z-index: 10;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        /* 雙卡片容器 */
        .cards-container {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 90vw; /* 在手機上佔據大部分寬度 */
            max-width: 600px; /* 在大螢幕上限制寬度 */
            display: flex;
            flex-direction: column; /* 手機預設上下疊 */
            gap: 15px;
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
        }

        @media (min-width: 768px) {
            .cards-container {
                flex-direction: row; /* 電腦版改為左右並排 */
                max-width: 650px;
            }
        }

        /* 兩張卡片的共通樣式 */
        .card-item {
            flex: 1;
            height: 320px; /* 固定高度，確保兩張一樣長 */
            background-color: white;
            padding: 25px 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            border-radius: 8px;
            border: 4px double #d4af37;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* 照片卡片的特別處理 */
        .card-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓照片填滿框架不變形 */
            border-radius: 4px;
        }

        /* 打開動畫 */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 5;
        }

        .envelope-wrapper.open .cards-container {
            transform: translate(-50%, -350px); /* 向上彈出 */
            opacity: 1;
            z-index: 20;
            pointer-events: auto;
        }

        .title {
            font-family: 'Ma Shan Zheng', cursive;
            color: #c0392b;
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        #statusMsg {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: #27ae60;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            animation: fadeInOut 3s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }

        .hint {
            margin-top: 30px;
            color: #94a3b8;
            font-size: 0.875rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <div id="statusMsg">收到！我們當天見囉！</div>

    <div class="container-wrapper">
        <div class="envelope-wrapper" id="invitation">
            <div class="flap"></div>
            <div class="envelope">
                <div class="pocket"></div>
                <div class="absolute inset-0 flex items-center justify-center z-[16] transition-opacity duration-300" id="seal">
                    <div class="bg-[#d4af37] w-14 h-14 rounded-full flex items-center justify-center border-2 border-white shadow-xl">
                        <span class="text-white font-bold text-xl">邀</span>
                    </div>
                </div>
            </div>

            <!-- 兩張並排/堆疊的卡片 -->
            <div class="cards-container" id="cardsBox">
                <!-- 左側/上方：照片卡 -->
                <div class="card-item card-photo">
                    <!-- 請將此處 src 換成您的照片網址 -->
                    <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&q=80&w=600" alt="聚餐照片">
                </div>

                <!-- 右側/下方：文字卡 -->
                <div class="card-item">
                    <h2 class="title">誠摯邀請</h2>
                    <div class="text-[#e74c3c] text-xl mb-2">♥</div>
                    <div class="text-sm text-gray-700 space-y-2">
                        <p class="font-bold text-gray-900">感謝各位平日的包容</p>
                        <p>想邀請您一起共享美食</p>
                        <div class="mt-4 pt-4 border-t border-dashed border-gray-300 text-xs text-left space-y-1">
                            <p>📅 2026年05月29日</p>
                            <p>⏰ 晚上 19:30</p>
                            <p>📍 樂葵法式鐵板燒-承德店</p>
                        </div>
                    </div>
                    <button id="confirmBtn" class="mt-4 w-full bg-[#c0392b] text-white py-2 rounded-lg text-xs font-bold active:scale-95 transition-all shadow-md">
                        點擊確認參加
                    </button>
                </div>
            </div>
        </div>

        <div class="hint" id="hint">點擊信封 開啟驚喜</div>
    </div>

    <script>
        const invitation = document.getElementById('invitation');
        const seal = document.getElementById('seal');
        const hint = document.getElementById('hint');
        const confirmBtn = document.getElementById('confirmBtn');
        const statusMsg = document.getElementById('statusMsg');

        invitation.addEventListener('click', function(e) {
            if (e.target.closest('#confirmBtn')) return;
            
            const isOpen = invitation.classList.toggle('open');
            if (isOpen) {
                seal.style.opacity = '0';
                hint.textContent = '點擊收回卡片';
            } else {
                seal.style.opacity = '1';
                hint.textContent = '點擊信封 開啟驚喜';
            }
        });

        confirmBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            statusMsg.style.display = 'block';
            confirmBtn.textContent = '已確認參加 ✔';
            confirmBtn.classList.replace('bg-[#c0392b]', 'bg-green-600');
            setTimeout(() => { statusMsg.style.display = 'none'; }, 3000);
        });
    </script>
</body>
</html>
