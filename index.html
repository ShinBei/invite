<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>饗宴邀約 - 互動邀請函</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;700&display=swap');

        body {
            background-color: #fdf2f2;
            font-family: 'Noto Serif TC', serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* 讓內容可以捲動，避免 600px 導致內容消失 */
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
        }

        /* 頂部間距 600px */
        .container-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 600px 20px 200px 20px; 
            width: 100%;
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            cursor: pointer;
            perspective: 1000px;
        }

        /* 信封本體 */
        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #c0392b;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 10;
        }

        /* 信封蓋子 */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #c0392b;
            clip-path: polygon(0 0, 50% 60%, 100% 0);
            z-index: 25;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pocket {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e74c3c;
            clip-path: polygon(0 0, 50% 60%, 100% 0, 100% 100%, 0 100%);
            z-index: 20;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        /* 卡片共用樣式 */
        .card-item {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 270px;
            height: 340px;
            background-color: white;
            padding: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.1);
            border-radius: 8px;
            border: 4px double #d4af37;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
            pointer-events: none; /* 平時不能點擊，避免擋住按鈕 */
        }

        /* 狀態 1: 開啟蓋子 + 彈出照片 */
        .state-1 .flap {
            transform: rotateX(180deg);
            z-index: 5;
        }
        .state-1 .card-photo {
            transform: translate(-50%, -240px) rotate(-3deg);
            opacity: 1;
            z-index: 15;
        }

        /* 狀態 2: 彈出邀請資訊並疊在最前 */
        .state-2 .card-info {
            transform: translate(-50%, -260px) rotate(2deg);
            opacity: 1;
            z-index: 30; /* 確保它在最前面 */
            pointer-events: auto; /* 開啟點擊 */
        }

        .card-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        .title {
            font-family: 'Ma Shan Zheng', cursive;
            color: #c0392b;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .hint {
            margin-top: 50px;
            color: #94a3b8;
            font-size: 0.9rem;
            animation: bounce 2s infinite;
            text-align: center;
        }

        #statusMsg {
            display: none;
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: #27ae60;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <div id="statusMsg">收到！我們當天見囉！</div>

    <div class="container-wrapper">
        <div class="envelope-wrapper" id="invitation">
            <!-- 信封蓋子 -->
            <div class="flap"></div>
            
            <!-- 信封主體 -->
            <div class="envelope">
                <div class="pocket"></div>
                <!-- 封蠟 -->
                <div class="absolute inset-0 flex items-center justify-center z-[26] transition-opacity duration-300" id="seal">
                    <div class="bg-[#d4af37] w-14 h-14 rounded-full flex items-center justify-center border-2 border-white shadow-xl">
                        <span class="text-white font-bold text-xl">邀</span>
                    </div>
                </div>
            </div>

            <!-- 第一階段：照片卡 -->
            <div class="card-item card-photo" id="photoCard">
                <!-- 請將此處 src 換成您的照片網址 -->
                <img src="Lu_pig.jpg" alt="聚餐照片">
            </div>

            <!-- 第二階段：詳細邀請資訊 -->
            <div class="card-item card-info" id="infoCard">
                <h2 class="title">誠摯邀請</h2>
                <div class="text-[#e74c3c] text-xl mb-1">♥</div>
                <div class="text-sm text-gray-700 space-y-1">
                    <p class="font-bold text-gray-900 text-base">歡慶Peter大瘦(?)</p>
                    <p>期待與您共度美好的時光</p>
                    <div class="mt-4 pt-4 border-t border-dashed border-gray-300 text-xs text-left space-y-2">
                        <p>📅 2026年05月29日</p>
                        <p>⏰ 晚上 19:30</p>
                        <p>📍 樂葵法式鐵板燒</p>
                    </div>
                </div>
                <button id="confirmBtn" class="mt-5 w-full bg-[#c0392b] text-white py-3 rounded-lg text-sm font-bold active:scale-95 transition-all shadow-md">
                    點擊確認參加
                </button>
            </div>
        </div>

        <div class="hint" id="hint">點擊信封開啟第一份驚喜</div>
    </div>

    <script>
        const invitation = document.getElementById('invitation');
        const seal = document.getElementById('seal');
        const hint = document.getElementById('hint');
        const confirmBtn = document.getElementById('confirmBtn');
        const statusMsg = document.getElementById('statusMsg');

        let clickStep = 0;

        invitation.addEventListener('click', function(e) {
            // 如果點擊的是確認按鈕，不要觸發卡片收回
            if (e.target === confirmBtn) return;
            
            clickStep++;

            if (clickStep === 1) {
                // 第一步：開信封，彈出照片
                invitation.classList.add('state-1');
                seal.style.opacity = '0';
                hint.textContent = '再點一下 看看詳細內容';
            } else if (clickStep === 2) {
                // 第二步：彈出邀請函文字
                invitation.classList.add('state-2');
                hint.textContent = '點擊卡片以外區域可收回';
            } else {
                // 第三步：全部收回
                invitation.classList.remove('state-1', 'state-2');
                setTimeout(() => { seal.style.opacity = '1'; }, 600);
                hint.textContent = '點擊信封開啟第一份驚喜';
                clickStep = 0;
            }
        });

        confirmBtn.addEventListener('click', function(e) {
            e.stopPropagation(); // 防止觸發信封收回
            statusMsg.style.display = 'block';
            confirmBtn.textContent = '已確認參加 ✔';
            confirmBtn.classList.replace('bg-[#c0392b]', 'bg-green-600');
            setTimeout(() => { 
                statusMsg.style.display = 'none'; 
            }, 3000);
        });
    </script>
</body>
</html>
